<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authorization Callback — TaraLabs</title>
<style>
  :root{--bg:#0b0f1a;--card:#161d31;--line:#243049;--txt:#e7ecf5;--muted:#9aa7c2;--accent:#2fa8ff;--accent2:#16e0c8;--ok:#21c07a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:radial-gradient(900px 500px at 70% -10%,rgba(47,168,255,.18),transparent),var(--bg);
    color:var(--txt);min-height:100vh;display:grid;place-items:center;padding:22px}
  .box{width:100%;max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px}
  .logo{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:13px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#03121f;margin-bottom:18px}
  h1{font-size:22px;margin-bottom:6px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
  .row{display:flex;gap:8px}
  .val{flex:1;background:#0d1322;border:1px solid var(--line);border-radius:10px;padding:12px 14px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;word-break:break-all;color:var(--accent2)}
  button{border:none;border-radius:10px;padding:0 16px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;font-size:13px}
  button:active{transform:scale(.97)}
  .ok{color:var(--ok);font-size:13px;margin-top:6px;height:16px}
  .miss{color:#f0a23c}
  .hint{margin-top:22px;font-size:13px;color:var(--muted);border-top:1px solid var(--line);padding-top:16px}
</style>
</head>
<body>
  <div class="box">
    <div class="logo">T3D</div>
    <h1>Authorization received ✅</h1>
    <p class="sub">Copy the values below and send them to complete the setup.</p>

    <div class="field">
      <label>Code</label>
      <div class="row">
        <div class="val" id="code">—</div>
        <button onclick="copy('code')">Copy</button>
      </div>
      <div class="ok" id="ok-code"></div>
    </div>

    <div class="field">
      <label>Shop ID</label>
      <div class="row">
        <div class="val" id="shop">—</div>
        <button onclick="copy('shop')">Copy</button>
      </div>
      <div class="ok" id="ok-shop"></div>
    </div>

    <div class="hint" id="hint"></div>
  </div>

<script>
  var p = new URLSearchParams(location.search);
  var code = p.get('code');
  var shop = p.get('shop_id') || p.get('main_account_id');
  document.getElementById('code').textContent = code || '(not found)';
  document.getElementById('shop').textContent = shop || '(not found)';
  if(!code){
    document.querySelector('h1').innerHTML = 'No authorization data <span class="miss">⚠️</span>';
    document.querySelector('.sub').textContent = 'Open this page via the Shopee authorization flow.';
  }
  document.getElementById('hint').textContent =
    'TaraLabs · Shopee Open Platform OAuth callback. This page only reads values from the URL; nothing is stored or sent anywhere.';
  function copy(id){
    var t = document.getElementById(id).textContent;
    navigator.clipboard.writeText(t).then(function(){
      document.getElementById('ok-'+id).textContent = 'Copied!';
      setTimeout(function(){document.getElementById('ok-'+id).textContent='';},1500);
    });
  }
</script>
</body>
</html>
